name: Publish crate

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v1.0.1
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish kafkalite-server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.87
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/server -> target

      - name: Verify formatting
        run: cargo fmt --check

      - name: Verify clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Verify tests
        run: cargo test --all-targets --all-features

      - name: Verify release tag matches Cargo.toml version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail

          cargo_version="$(grep '^version = ' Cargo.toml | cut -d '"' -f2)"
          tag_version="${RELEASE_TAG#v}"

          if [[ "$cargo_version" != "$tag_version" ]]; then
            echo "Cargo.toml version ($cargo_version) does not match release tag ($RELEASE_TAG)" >&2
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
